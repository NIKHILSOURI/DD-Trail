name: dreamdiffusion
channels:
  - pytorch
  - defaults
dependencies:
  - python=3.11  # Updated from 3.8.5 for better Windows compatibility
  - pip>=23.0
  - pip:
    # Core ML libraries - install PyTorch separately for CUDA support
    # For CUDA: pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cu118
    # For CPU: pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
    - numpy>=1.24.0,<2.0.0
    - scipy>=1.10.0,<2.0.0
    
    # PyTorch Lightning and related
    - pytorch-lightning>=2.0.5,<2.1.0
    - torchmetrics>=0.11.0,<1.0.0
    
    # Vision and image processing
    - Pillow>=10.0.0,<11.0.0
    - opencv-python>=4.8.0,<5.0.0
    - scikit-image>=0.21.0,<1.0.0
    - kornia>=0.7.0,<1.0.0
    
    # Transformers and CLIP
    - transformers>=4.30.0,<5.0.0
    
    # Config and utilities
    - omegaconf>=2.3.0,<3.0.0
    - einops>=0.6.1,<1.0.0
    - tqdm>=4.65.0,<5.0.0
    - pyyaml>=6.0,<7.0.0
    
    # Model utilities
    - timm>=0.9.0,<1.0.0
    
    # Logging and metrics
    - wandb>=0.15.0,<1.0.0
    - torch-fidelity>=0.3.0,<1.0.0
    - lpips>=0.1.4,<1.0.0
    
    # Data utilities
    - natsort>=8.0.0,<9.0.0
    - matplotlib>=3.7.0,<4.0.0
    
    # Optional but recommended
    - scikit-learn>=1.3.0,<2.0.0
    
    # Install code package
    - -e ./code